name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  # ============================================================================
  # STAGE 1: All tests run in parallel
  # ============================================================================

  lambda-syntax:
    name: Lambda Syntax
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v6
        with:
          clean: true

      - name: Compile all Lambda handler sources
        run: |
          PYTHON=$(command -v python3.12 || command -v python3)
          if [ -z "$PYTHON" ]; then
            echo "::error::No python3.12 or python3 found on PATH"
            exit 1
          fi
          # Compile every .py file under infra/ — catches SyntaxError before
          # docker build copies broken code into a Lambda image. Specifically
          # guards against `keyword argument repeated`-class regressions like
          # the one that crashed unified_evaluator after #861's rebase.
          find infra -name '*.py' -not -path '*/node_modules/*' -not -path '*/.venv*/*' -print0 \
            | xargs -0 "$PYTHON" -m py_compile

  python-tests:
    name: Python (${{ matrix.package }})
    runs-on: [self-hosted, macOS, ARM64]
    strategy:
      fail-fast: false
      matrix:
        package: [receipt_dynamo, receipt_dynamo_stream, receipt_chroma, receipt_places]
    steps:
      - uses: actions/checkout@v6
        with:
          clean: true

      - name: Setup Python
        run: |
          # Detect Python 3.12+ (framework install or Homebrew)
          if [ -f "/Library/Frameworks/Python.framework/Versions/3.12/bin/python3" ]; then
            echo "/Library/Frameworks/Python.framework/Versions/3.12/bin" >> $GITHUB_PATH
          elif [ -f "/opt/homebrew/bin/python3.12" ]; then
            echo "/opt/homebrew/bin" >> $GITHUB_PATH
          fi

      - name: Install and test
        run: |
          # Create fresh virtual environment (prefer python3.12 over system python3)
          PYTHON=$(command -v python3.12 || command -v python3)
          if [ -z "$PYTHON" ]; then
            echo "::error::No python3.12 or python3 found on PATH"
            exit 1
          fi
          "$PYTHON" -m venv .venv-${{ matrix.package }}
          source .venv-${{ matrix.package }}/bin/activate
          pip install --upgrade pip wheel

          # Install based on package dependencies
          case "${{ matrix.package }}" in
            receipt_chroma)
              pip install -e receipt_dynamo
              pip install --no-deps -e receipt_dynamo_stream
              pip install --no-deps -e receipt_chroma
              pip install boto3 chromadb "openai>=2.8.1,<3.0.0"
              pip install pytest pytest-mock pytest-cov pytest-xdist pytest-timeout pytest-rerunfailures moto
              ;;
            receipt_dynamo_stream)
              pip install -e receipt_dynamo
              pip install --no-deps -e receipt_dynamo_stream
              pip install boto3 pytest pytest-mock pytest-cov pytest-xdist pytest-timeout pytest-rerunfailures moto
              ;;
            receipt_places)
              pip install -e receipt_dynamo
              pip install --no-deps -e receipt_places
              pip install pydantic pydantic-settings structlog boto3 requests tenacity
              pip install pytest pytest-mock pytest-cov pytest-xdist pytest-timeout pytest-rerunfailures moto responses
              ;;
            *)
              pip install -e "${{ matrix.package }}[test]"
              ;;
          esac

          # Lint (uses versions from pyproject.toml [lint] dependency)
          pip install -e "${{ matrix.package }}[lint]"
          black --check --line-length=79 ${{ matrix.package }}
          isort --check-only --profile=black --line-length=79 ${{ matrix.package }}

          # Test
          # --reruns 1 --reruns-delay 2: retry once with a 2s pause to absorb
          # environmental flakes (moto-S3 timestamp races, ChromaDB lock
          # contention under pytest-xdist). Real test failures still fail
          # the build after the retry; only transient failures get masked.
          cd ${{ matrix.package }}
          python -m pytest tests -n auto --timeout=120 --tb=short --maxfail=5 \
            --reruns 1 --reruns-delay 2 \
            -m "not end_to_end and not slow and not performance and not unused_in_production" \
            --cov --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.package }}
          path: ${{ matrix.package }}/coverage.xml
          retention-days: 1

  typescript-tests:
    name: TypeScript
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Lint and test
        working-directory: portfolio
        run: |
          npm ci --prefer-offline
          npm run lint
          npm run type-check
          npm run test:ci

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-portfolio
          path: portfolio/coverage
          retention-days: 1

  browser-tests:
    name: Browser Tests
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build and test
        working-directory: portfolio
        env:
          CI: true
        run: |
          # Free port 3001 from any prior CI job that crashed without
          # cleanup. Without this, Playwright's webServer fails to bind
          # ("localhost:3001 already used") and skips the rest of the
          # pipeline including Deploy. Self-hosted runners share state
          # across jobs, so we can't rely on container teardown.
          lsof -ti:3001 | xargs -r kill -9 2>/dev/null || true

          # Re-free the port on exit so the next job starts clean even
          # if Playwright crashes mid-run.
          trap 'lsof -ti:3001 | xargs -r kill -9 2>/dev/null || true' EXIT

          npm ci --prefer-offline
          npm run build
          npx playwright install chromium firefox webkit
          npx playwright test e2e/hydration.spec.ts --project=chromium --project=firefox --project=webkit

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: portfolio/playwright-report/
          retention-days: 7

  # ============================================================================
  # STAGE 2: Deploy (only after ALL tests pass, main branch only)
  # ============================================================================

  deploy:
    name: Deploy
    needs: [lambda-syntax, python-tests, typescript-tests, browser-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "portfolio/package-lock.json"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: docker/setup-buildx-action@v4

      - name: Build portfolio
        working-directory: portfolio
        run: |
          npm ci --prefer-offline
          npm run build

      - name: Deploy infrastructure
        run: |
          cd infra
          pip install -e .
          pulumi stack select tnorlund/portfolio/prod
          pulumi up --yes
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Deploy to S3 + CloudFront
        run: |
          cd infra
          BUCKET=$(pulumi stack output cdn_bucket_name)
          DIST_ID=$(pulumi stack output cdn_distribution_id)

          # IMPORTANT: --exclude "assets/*" preserves images uploaded by receipt processing pipeline
          # Without this, every deploy would delete all CDN-hosted images
          aws s3 sync ../portfolio/out s3://$BUCKET --delete --exclude "assets/*" --cache-control "public, max-age=3600"
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ============================================================================
  # STAGE 3: Post-deploy smoke tests
  # ============================================================================

  smoke-tests:
    name: Smoke Tests
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run backend E2E tests
        run: |
          pip install -e "receipt_dynamo[test]"
          cd receipt_dynamo
          pytest -m end_to_end --timeout=600 --tb=short
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ============================================================================
  # Docs (runs on main, doesn't block anything)
  # ============================================================================

  docs:
    name: Generate Docs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "portfolio/package-lock.json"

      - name: Generate and commit docs
        working-directory: portfolio
        run: |
          npm ci --prefer-offline
          npm run docs

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update TypeDoc documentation [skip ci]"
          file_pattern: "portfolio/docs/**"
