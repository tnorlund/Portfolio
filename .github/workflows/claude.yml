name: Claude Code

# Two ways to invoke Claude on this repo:
#   1. Auto-review  - runs on every PR open/update (the `auto-review` job)
#   2. @claude       - mention @claude in a PR/issue comment, review, or issue body
#                      to ask for changes, explanations, fixes, etc. (the `claude-mention` job)
#
# Auth: uses CLAUDE_CODE_OAUTH_TOKEN, which draws from your Claude subscription
# quota instead of API per-token billing. Generate it locally with `claude setup-token`
# and add it under Settings -> Secrets and variables -> Actions as CLAUDE_CODE_OAUTH_TOKEN.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened]

concurrency:
  # Don't run two Claude jobs against the same PR/issue at once.
  group: claude-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: false

jobs:
  # Automatic review on every PR open / push.
  auto-review:
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          clean: true

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request's diff for bugs, security issues, and
            style/maintainability problems. Focus on real, actionable findings and
            skip nitpicks. Post inline comments on the specific lines involved, plus a
            short summary. This repo spans Python (receipt_* packages, infra/ Pulumi)
            and Swift (receipt_ocr_swift). Be concise.

  # Responds when someone mentions @claude in a comment, review, or issue.
  claude-mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          clean: true

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
