# Codex profile for the autonomous synthesis loop.
# codex >= 0.142 uses SPLIT-FILE profiles: this file is copied verbatim to
#   ~/.codex/synthesis-loop.config.toml
# and selected with `codex exec --profile synthesis-loop`. Do NOT paste it as a
# [profiles.synthesis-loop] table inside ~/.codex/config.toml — newer codex errors on that.
# bootstrap_mini.sh installs it the right way.
#
# Why workspace-write (not danger-full-access): the brain step only edits files — it needs NO
# network. Render (DynamoDB) and the Claude judge run in the SHELL (run_loop.sh), outside the
# sandbox. Keeping the sandbox on means a misbehaving round cannot touch the network or escape the repo.

approval_policy = "never"          # fully autonomous — no approval prompts
sandbox_mode = "workspace-write"   # edit files only; no network from spawned cmds
# model / effort inherit your global defaults; override here if you want a cheaper brain:
# model = "gpt-5.5"
# model_reasoning_effort = "high"

[sandbox_workspace_write]
exclude_tmpdir_env_var = false
exclude_slash_tmp = false
